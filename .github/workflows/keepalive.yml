name: keepalive-and-backup

# B8: Supabase free tier pause setelah 7 hari idle -> ping tiap hari.
# B9: backup harian via pg_dump -> commit ke repo (private).
#
# 2026-07-21: project SEMPAT ke-pause beneran (email dari Supabase) walau
# job "keepalive" di bawah ini selalu "success" tiap kali jalan. Dua akar
# masalah yang dibenahi sekaligus di sini, karena Supabase sendiri gak
# jelasin persis kriteria "aktivitas"-nya di dokumentasi resmi:
#   1. Jadwal lama "tiap 3 hari" nyisain nyaris NOL margin — sekali aja
#      satu run telat/gagal (GitHub Actions scheduled workflow memang
#      dikenal kadang delay/dilewatin pas beban tinggi, bukan dijamin
#      presisi), jarak ke run berikutnya bisa gampang lewat 7 hari.
#      Diganti jadi HARIAN — kalaupun 1 run gagal, masih ada 6 hari
#      margin sebelum kena batas.
#   2. Step lama cuma SELECT (baca doang) — cukup ambigu apakah itu
#      dihitung "database activity" beneran oleh Supabase. Diganti jadi
#      UPSERT (nulis) ke bot_settings, yang jauh lebih gak ambigu sebagai
#      "aktivitas" di kriteria manapun.
# Backup job (pg_dump) TETAP jalan harian juga seperti sebelumnya — itu
# koneksi Postgres langsung yang beda jalur dari REST API, jadi tetap
# dipertahankan sebagai lapisan tambahan, bukan pengganti REST ping ini.
on:
  schedule:
    - cron: "0 2 * * *"   # harian, 02:00 UTC (keepalive)
    - cron: "0 3 * * *"   # harian, 03:00 UTC (backup)
  workflow_dispatch:

jobs:
  keepalive:
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (write, not just read)
        run: |
          curl -fsS "${{ secrets.SUPABASE_URL }}/rest/v1/bot_settings" \
            -X POST \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\": \"last_keepalive_ping\", \"value\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            && echo "Supabase alive (wrote last_keepalive_ping)."

  backup:
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # izinkan commit backup tanpa ubah setting repo
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 client
        # Supabase server = PG17; pg_dump harus >= versi server. Default runner = 16.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
      - name: Dump database
        run: |
          mkdir -p backups
          STAMP=$(date -u +%Y-%m-%d)
          # pg_dump butuh session pooler (port 5432), bukan transaction pooler (6543).
          DUMP_URL="${{ secrets.SUPABASE_DB_URL }}"
          DUMP_URL="${DUMP_URL/:6543/:5432}"
          /usr/lib/postgresql/17/bin/pg_dump "$DUMP_URL" --no-owner --no-privileges \
            -f "backups/fintrack_${STAMP}.sql"
      - name: Commit backup
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f backups/*.sql
          git commit -m "backup: $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
